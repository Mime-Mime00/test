<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Para Sofi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #fbf7f1;
    --ink: #3f3a34;
    --accent: #a9744a;
    --accent-soft: #d9c2a3;
    --leaf: #93a374;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Lora', serif;
    color: var(--ink);
    overscroll-behavior: none;
  }
  body {
    height: 100dvh;
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- GATE (pantalla de bienvenida) ---------- */
  .gate {
    position: fixed;
    inset: 0;
    background: #ece5d8;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 1000;
    transition: opacity 0.5s ease;
  }
  .gate-card {
    max-width: 420px;
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--accent-soft);
    border-radius: 10px;
    padding: 40px 28px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(60,45,25,0.18);
  }
  .gate-icon { font-size: 30px; margin-bottom: 12px; }
  .gate-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 24px;
    color: #8a5a34;
    margin: 0 0 14px;
  }
  .gate-text {
    font-size: 14px;
    line-height: 1.7;
    margin: 0 0 26px;
  }
  .gate-btn {
    font-family: 'Lora', serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 13px 34px;
    border-radius: 30px;
    cursor: pointer;
  }
  .gate-btn:active { transform: scale(0.97); }

  /* ---------- ESCENARIO ---------- */
  .stage {
    position: relative;
    height: 100dvh;
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background: linear-gradient(165deg, #fdf3e6 0%, #f6dfc0 100%);
    transition: background 1.1s ease;
    overflow: hidden;
  }

  .progress-track {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(63,58,52,0.12);
    z-index: 60;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 0.5s ease;
  }

  .act-label {
    position: fixed;
    top: max(16px, env(safe-area-inset-top));
    left: 16px;
    right: 56px;
    font-size: 10.5px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.85;
    transition: opacity 0.4s ease;
    z-index: 40;
  }

  .music-toggle {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    right: 12px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(251,247,241,0.85);
    border: 1px solid var(--accent-soft);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    cursor: pointer;
    z-index: 60;
  }

  .petal {
    position: fixed;
    top: -20px;
    font-size: 16px;
    opacity: 0.85;
    pointer-events: none;
    animation-name: fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    color: var(--leaf);
    z-index: 5;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(115vh) rotate(220deg); opacity: 0; }
  }

  /* ---------- CAJA DE DIÁLOGO ---------- */
  .dialogue-wrap {
    position: relative;
    z-index: 20;
    padding: 16px max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
  }
  .dialogue-box {
    max-width: 560px;
    margin: 0 auto;
    background: rgba(251,247,241,0.94);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid var(--accent-soft);
    border-radius: 16px;
    padding: 18px 18px 12px;
    box-shadow: 0 -8px 30px rgba(60,45,25,0.16);
  }
  .speaker-tag {
    display: inline-block;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 13px;
    color: #fff;
    background: var(--accent);
    padding: 3px 14px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .dialogue-text {
    font-size: 15px;
    line-height: 1.68;
    margin: 0 0 12px;
    max-height: 34vh;
    overflow-y: auto;
    white-space: pre-line;
  }
  .dialogue-text.memory {
    font-style: italic;
    color: #6b4a2e;
  }
  .cursor {
    display: inline-block;
    animation: blink 0.9s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .nav-btn {
    width: 46px;
    height: 46px;
    flex-shrink: 0;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .nav-btn:active { transform: scale(0.94); }
  .nav-btn:disabled { opacity: 0.28; pointer-events: none; }
  .scene-count {
    font-size: 11.5px;
    letter-spacing: 1px;
    color: var(--ink);
    opacity: 0.55;
  }

  .lotus-final {
    text-align: center;
    font-size: 30px;
    margin: 2px 0 8px;
  }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-icon">🎧</div>
    <div class="gate-title">Antes de comenzar...</div>
    <p class="gate-text">Esta carta fue escrita con calma, y me gustaría que la vivieras de la misma forma. Busca un momento tranquilo, ponte los audífonos — hay música de fondo pensada para acompañarte — y avanza a tu propio ritmo con las flechas.</p>
    <button class="gate-btn" id="openBtn">Comenzar</button>
  </div>
</div>

<div id="yt-player-container" style="position:fixed; top:-9999px; left:-9999px; width:1px; height:1px; overflow:hidden;">
  <div id="yt-player"></div>
</div>
<button class="music-toggle" id="musicToggle" title="Silenciar / reproducir música">🔊</button>

<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
<div class="act-label" id="actLabel"></div>

<div class="stage" id="stage">
  <div class="dialogue-wrap">
    <div class="dialogue-box">
      <span class="speaker-tag" id="speakerTag">Ike</span>
      <p class="dialogue-text" id="dialogueText"></p>
      <div class="nav-row">
        <button class="nav-btn" id="prevBtn" aria-label="Anterior">‹</button>
        <span class="scene-count" id="sceneCount">1 / 14</span>
        <button class="nav-btn" id="nextBtn" aria-label="Siguiente">›</button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const actBg = {
    1: 'linear-gradient(165deg, #fdf3e6 0%, #f6dfc0 100%)',
    2: 'linear-gradient(165deg, #e8e1d8 0%, #cdbcb0 100%)',
    3: 'linear-gradient(165deg, #fff8ea 0%, #ffe2a6 100%)'
  };

  const scenes = [
    { act: 1, actLabel: 'Capítulo I · Antes de todo',
      text: 'Esta carta no te la escribo como Johan, sino como Ike, ese amigo que siempre estuvo para ti y que, a pesar de todo lo ocurrido, sé que aún sigue estando presente en tu corazón, brindándote ese apoyo que tal vez no puedo darte ahora.' },
    { act: 1, actLabel: 'Capítulo I · Antes de todo',
      text: 'Hoy es una fecha muy especial, pues se trata de tu cumpleaños, de tu primavera número 19, y aunque no puedas ver la primavera con tus propios ojos ni caminar por un campo de flores bajo el sol primaveral que solo algunos lugares te brindan, sé que la llevas dentro, la misma que hace florecer todo lo que toca, así como tú, sin darte cuenta, sigues floreciendo. Hoy quiero recordarte todo lo que ha significado este camino tuyo, hoy más que nunca.' },

    { act: 2, actLabel: 'Capítulo II · El silencio que nos separó',
      text: 'No necesito que me cuentes cada detalle para saber que estos últimos momentos de tu vida no han sido fáciles; incluso desde la distancia, puedo percibir cómo has enfrentado situaciones difíciles. ¿Y sabes qué conclusión saco de ello? Me alegra el cómo lo has enfrentado, y aunque a lo mejor aún duela un poco, me alegra el cómo lo has hecho: con una fuerza que, aunque yo insistía en recordarte que tenías, terminaste por descubrir tú sola.' },
    { act: 2, actLabel: 'Capítulo II · El silencio que nos separó',
      text: 'Recuerdo bien una época en la que te decía:' },
    { act: 2, actLabel: 'Capítulo II · El silencio que nos separó', type: 'memory', speaker: 'Recuerdo',
      bg: 'linear-gradient(165deg, #f1e6d2 0%, #d9c191 100%)',
      text: '"Tienes que ser fuerte, eres una persona maravillosa, enfrenta tus miedos, no llores más. Eres una mujer con un gran futuro por delante, y sé que en algún momento serás esa chica fuerte y llena de coraje y valentía que sé que habita dentro de ti".' },
    { act: 2, actLabel: 'Capítulo II · El silencio que nos separó',
      text: 'No fueron palabras de un día, sino de una conversación que sostuvimos a nuestra manera durante mucho tiempo. Y ahora, viéndote desde la distancia, sé que esa chica por fin está aquí.' },
    { act: 2, actLabel: 'Capítulo II · El silencio que nos separó',
      text: 'A pesar del tiempo en el que la distancia y el silencio se apoderaron de nosotros, un alejamiento que realmente no buscamos pero tampoco supimos evitar, algo sí me trae tranquilidad: saber que, incluso en ese silencio y en esa distancia, seguiste creciendo, seguiste adelante, sin necesitarme para hacerlo.' },
    { act: 2, actLabel: 'Capítulo II · El silencio que nos separó',
      text: 'Eso no me duele, Sofi; me llena de alegría, pero especialmente me llena de mucho orgullo saber que algo que busqué por mucho tiempo, y traté de inculcarte desde el momento en que nos conocimos, era hacerte abrir los ojos, hacer que te dieras cuenta de que eras alguien más fuerte de lo que tú creías, que a pesar de los problemas, tú sola tenías la fuerza para levantarte de nuevo y seguir adelante a pesar de todo.' },
    { act: 2, actLabel: 'Capítulo II · El silencio que nos separó', type: 'confession',
      bg: 'linear-gradient(165deg, #cdbfb2 0%, #a9998c 100%)',
      text: 'No te mentiré, Sofi: en el fondo me duele un poco saber que eso que por tanto tiempo busqué para ti, lo lograste encontrar por tu cuenta, y sin necesitar de mí.' },

    { act: 3, actLabel: 'Capítulo III · Lo que sigue',
      text: 'Aunque en el fondo me duela un poco, no puedo dejar de sentir alegría por ti y por todas las cosas que has conseguido tú sola, y aunque a veces las cosas parecen difíciles o imposibles de conseguir, no te has rendido nunca.' },
    { act: 3, actLabel: 'Capítulo III · Lo que sigue',
      text: 'Hoy más que nunca puedo decirlo: Sofi, me siento muy orgulloso de ti, de tus metas y tus logros, que por más pequeños que tú los consideres, no dejarán de ser importantes, porque a veces solo necesitamos a alguien que nos recuerde esos pequeños logros del día a día, esas pequeñas metas que logramos conseguir, porque a veces recordarlas nos hace ser conscientes de lo mucho que podemos mejorar y cambiar día tras día.' },
    { act: 3, actLabel: 'Capítulo III · Lo que sigue',
      text: 'Hoy, mientras poco a poco volvemos a encontrarnos, mientras poco a poco volvemos a conocernos y a redescubrirnos, no quiero pedirte que corramos, ni que recuperemos todo ese tiempo y esa ausencia de golpe.' },
    { act: 3, actLabel: 'Capítulo III · Lo que sigue',
      text: 'Solo quiero agradecerte por lo que fuimos, por lo que aprendí a tu lado, y por la oportunidad de volver a estar, aunque ya no sea lo mismo. Cierro esta etapa con gratitud, no con nostalgia, sabiendo que lo mejor de nuestra historia quizás todavía no se ha escrito.' },
    { act: 3, actLabel: 'Capítulo III · Lo que sigue', type: 'final',
      bg: 'linear-gradient(165deg, #fffaf0 0%, #ffe9b8 100%)',
      text: 'Feliz cumpleaños, Sofi. Que la vida te siga regalando razones para sonreír, y que sepas que, pase lo que pase, siempre habrá alguien que se alegra profundamente de verte florecer.\n\n🪷\n\nAtt: Ike' }
  ];

  const gate = document.getElementById('gate');
  const stage = document.getElementById('stage');
  const actLabelEl = document.getElementById('actLabel');
  const speakerTag = document.getElementById('speakerTag');
  const dialogueText = document.getElementById('dialogueText');
  const progressFill = document.getElementById('progressFill');
  const sceneCount = document.getElementById('sceneCount');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const musicToggle = document.getElementById('musicToggle');
  const openBtn = document.getElementById('openBtn');

  let ytPlayer;
  let ytReady = false;
  let pendingPlay = false;

  function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('yt-player', {
      height: '1',
      width: '1',
      videoId: 'GzzQZZ9de-w',
      playerVars: {
        autoplay: 0,
        controls: 0,
        disablekb: 1,
        modestbranding: 1,
        loop: 1,
        playlist: 'GzzQZZ9de-w',
        fs: 0,
        iv_load_policy: 3,
        rel: 0
      },
      events: {
        onReady: () => {
          ytReady = true;
          if (pendingPlay) {
            ytPlayer.playVideo();
            pendingPlay = false;
          }
        }
      }
    });
  }

  let current = 0;
  let typingId = null;
  let isTyping = false;
  let lastActLabel = '';
  let petalsSpawned = false;

  function spawnPetals() {
    if (petalsSpawned) return;
    petalsSpawned = true;
    const emojis = ['🌸','🌿','🌼'];
    for (let i = 0; i < 16; i++) {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      petal.style.left = Math.random() * 100 + 'vw';
      petal.style.animationDuration = (9 + Math.random() * 9) + 's';
      petal.style.animationDelay = (Math.random() * 6) + 's';
      petal.style.fontSize = (12 + Math.random() * 10) + 'px';
      document.body.appendChild(petal);
    }
  }

  function typeText(text) {
    clearInterval(typingId);
    dialogueText.textContent = '';
    isTyping = true;
    const chars = Array.from(text);
    let i = 0;
    typingId = setInterval(() => {
      dialogueText.textContent += chars[i];
      i++;
      if (i >= chars.length) {
        clearInterval(typingId);
        isTyping = false;
      }
    }, 20);
  }

  function finishTyping() {
    clearInterval(typingId);
    dialogueText.textContent = scenes[current].text;
    isTyping = false;
  }

  function render() {
    const s = scenes[current];
    stage.style.background = s.bg || actBg[s.act];

    if (s.actLabel !== lastActLabel) {
      actLabelEl.style.opacity = 0;
      setTimeout(() => {
        actLabelEl.textContent = s.actLabel;
        actLabelEl.style.opacity = 0.85;
      }, 250);
      lastActLabel = s.actLabel;
    }

    speakerTag.textContent = s.speaker || 'Ike';
    dialogueText.className = 'dialogue-text' + (s.type === 'memory' ? ' memory' : '');

    progressFill.style.width = ((current + 1) / scenes.length * 100) + '%';
    sceneCount.textContent = (current + 1) + ' / ' + scenes.length;

    prevBtn.disabled = current === 0;
    if (current === scenes.length - 1) {
      nextBtn.innerHTML = '↺';
      nextBtn.setAttribute('aria-label', 'Leer de nuevo');
      spawnPetals();
    } else {
      nextBtn.innerHTML = '›';
      nextBtn.setAttribute('aria-label', 'Siguiente');
    }

    typeText(s.text);
  }

  openBtn.addEventListener('click', () => {
    gate.style.opacity = '0';
    setTimeout(() => { gate.style.display = 'none'; }, 500);
    musicToggle.style.display = 'flex';
    render();
    if (ytReady && ytPlayer && ytPlayer.playVideo) {
      ytPlayer.playVideo();
    } else {
      pendingPlay = true;
    }
  });

  nextBtn.addEventListener('click', () => {
    if (isTyping) { finishTyping(); return; }
    if (current === scenes.length - 1) {
      current = 0;
      render();
      return;
    }
    current++;
    render();
  });

  prevBtn.addEventListener('click', () => {
    if (current === 0) return;
    current--;
    render();
  });

  document.addEventListener('keydown', (e) => {
    if (gate.style.display === 'none') {
      if (e.key === 'ArrowRight') nextBtn.click();
      if (e.key === 'ArrowLeft') prevBtn.click();
    }
  });

  musicToggle.addEventListener('click', () => {
    if (!ytPlayer || !ytPlayer.getPlayerState) return;
    const playing = ytPlayer.getPlayerState() === 1;
    if (playing) {
      ytPlayer.pauseVideo();
      musicToggle.textContent = '🔈';
    } else {
      ytPlayer.playVideo();
      musicToggle.textContent = '🔊';
    }
  });
</script>

</body>
</html>
